<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signup | AgriWealth</title>
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">
  <main class="auth-shell signup-shell">
    <section class="auth-art signup-art">
      <a href="index.html" class="logo">AgriWealth</a>
      <div class="auth-art-copy">
        <span class="eyebrow">Start Growing</span>
        <h1>Create a premium agriculture investment account.</h1>
        <p>Join a refined fintech experience designed around productive farms and transparent portfolio movement.</p>
      </div>
    </section>
    <section class="auth-panel glass">
      <span class="eyebrow">Investor Onboarding</span>
      <h2 class="auth-title">Create Account</h2>
      <form id="signupForm">
        <div class="form-grid-2">
          <div class="input-group"><input type="text" class="input" placeholder="First Name" required id="first"></div>
          <div class="input-group"><input type="text" class="input" placeholder="Last Name" required id="last"></div>
        </div>
        <div class="input-group"><input type="email" class="input" placeholder="Email" required id="email"></div>
        <div class="input-group"><input type="password" class="input" placeholder="Password" required id="pass"><button type="button" class="toggle-eye" id="togglePassword">Show</button></div>
        <div class="strength"><div class="strength-bar"></div></div>
        <div class="form-grid-2">
          <div class="input-group"><input type="tel" class="input" placeholder="Phone" id="phone"></div>
          <div class="input-group"><select class="input" id="country"><option value="">Select Country</option><option>Ghana</option><option>Nigeria</option><option>Kenya</option><option>South Africa</option></select></div>
        </div>
        <button type="submit" class="btn auth-submit" id="signupBtn">Sign Up</button>
      </form>
      <p class="auth-link">Have an account? <a href="login.html">Login</a></p>
    </section>
  </main>
<script type="module">

import { signupUser } from './js/auth.js';
import { initRouter } from './js/router.js';

console.log("[Signup] Loaded");

const signupBtn =
document.getElementById('signupBtn');

const passInput =
document.getElementById('pass');

const toggleBtn =
document.getElementById('togglePassword');

const bar =
document.querySelector('.strength-bar');


// Password show/hide

toggleBtn.addEventListener(
'click',
()=>{

const hidden=
passInput.type==="password";

passInput.type=
hidden
?
'text'
:
'password';

toggleBtn.textContent=
hidden
?
'🙈'
:
'👁';

}
);


// Password strength

passInput.addEventListener(
'input',
()=>{

let s=
(passInput.value.length>5)
+
(/[A-Z]/.test(passInput.value))
+
(/[0-9]/.test(passInput.value));

bar.style.width=
`${s*33}%`;

bar.style.background=
[
'#e74c3c',
'#f39c12',
'#52b788'
][s];

}
);


// Signup submit

document
.getElementById(
'signupForm'
)
.addEventListener(
'submit',
async(e)=>{

e.preventDefault();

signupBtn.disabled=true;

signupBtn.textContent=
"Creating...";

try{

const ok=
await signupUser(

document.getElementById(
'first'
).value,

document.getElementById(
'last'
).value,

document.getElementById(
'email'
).value,

passInput.value,

document.getElementById(
'phone'
).value,

document.getElementById(
'country'
).value

);

if(ok){

console.log(
"[Signup] Success"
);

// Don't use markRedirecting here
// Signup isn't logging in

setTimeout(()=>{

window.location.replace(
'login.html'
);

},500);

}

}catch(error){

console.error(
error
);

}

finally{

signupBtn.disabled=false;

signupBtn.textContent=
"Sign Up";

}

}
);


// Router listener

initRouter();

</script>
</body>
</html>
