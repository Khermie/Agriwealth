<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | AgriWealth</title>
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">
  <main class="auth-shell">
    <section class="auth-art">
      <a href="index.html" class="logo">AgriWealth</a>
      <div class="auth-art-copy">
        <span class="eyebrow">Welcome Back</span>
        <h1>Return to your agriculture portfolio.</h1>
        <p>Track farm-backed investments, deposits, and growth from a premium dashboard built for clarity.</p>
      </div>
    </section>
    <section class="auth-panel glass">
      <span class="eyebrow">Secure Login</span>
      <h2 class="auth-title">Sign in to AgriWealth</h2>
      <form id="loginForm">
        <div class="input-group"><input type="email" class="input" placeholder="Email" required id="email"></div>
        <div class="input-group"><input type="password" class="input" placeholder="Password" required id="pass"><button type="button" class="toggle-eye" id="togglePassword">Show</button></div>
        <button type="submit" class="btn auth-submit" id="loginBtn">Sign In</button>
        <p style="text-align:center;margin-top:12px;"><a href="#" id="forgotLink" style="color:var(--amber);font-weight:800;font-size:0.88rem;">Forgot password?</a></p>
      </form>
      <div class="social-row">
        <button class="btn btn-outline social-btn" data-provider="google">Google</button>
        <button class="btn btn-outline social-btn" data-provider="facebook">Facebook</button>
      </div>
      <p class="auth-link">No account? <a href="signup.html">Sign Up</a></p>
    </section>
  </main>
  <script type="module">

import {
loginUser,
loginWithProvider,
resetPassword
}
from './js/auth.js';

import {
initRouter
}
from './js/router.js';

import {
showToast
}
from './js/utils.js';

console.log("[Login] Loaded");

const loginBtn=
document.getElementById(
'loginBtn'
);

const socialBtns=
document.querySelectorAll(
'.social-btn'
);

const passInput=
document.getElementById(
'pass'
);

const toggleBtn=
document.getElementById(
'togglePassword'
);


// Password toggle

toggleBtn.addEventListener(
'click',
()=>{

const hidden=
passInput.type==="password";

passInput.type=
hidden
?
"text"
:
"password";

toggleBtn.textContent=
hidden
?
"🙈"
:
"👁";

}
);


// Forgot password

document
.getElementById(
'forgotLink'
)
.addEventListener(
'click',
async(e)=>{

e.preventDefault();

const email=
document.getElementById(
'email'
).value.trim();

if(!email){

showToast(
"Enter email first",
"warning"
);

return;

}

await resetPassword(
email
);

}
);


// Login submit

document
.getElementById(
'loginForm'
)
.addEventListener(
'submit',
async(e)=>{

e.preventDefault();

loginBtn.disabled=true;

loginBtn.textContent=
"Signing in...";

try{

await loginUser(

document.getElementById(
'email'
).value.trim(),

passInput.value

);

// NO redirect here
// auth.js handles redirect

}
catch(error){

console.error(
error
);

}
finally{

setTimeout(()=>{

loginBtn.disabled=false;

loginBtn.textContent=
"Sign In";

},1000);

}

}
);


// Social login

socialBtns.forEach(
btn=>{

btn.addEventListener(
'click',
async()=>{

const provider=
btn.dataset.provider;

socialBtns.forEach(
b=>b.disabled=true
);

try{

await loginWithProvider(
provider
);

}
finally{

socialBtns.forEach(
b=>b.disabled=false
);

}

}
);

}
);


// Start router ONCE

initRouter();

</script>
</body>
</html>
