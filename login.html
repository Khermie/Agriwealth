<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | AgriWealth</title>
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/style.css">
  <!-- ✅ Auth gate: hide form until auth state resolves to prevent blink/flash -->
  <style>
    .auth-shell { opacity: 0; transition: opacity 0.25s ease; }
    .auth-shell.auth-ready { opacity: 1; }
  </style>
</head>
<body class="auth-body">
  <main class="auth-shell">
    <section class="auth-art">
      <a href="index.html" class="logo">AgriWealth</a>
      <div class="auth-art-copy">
        <span class="eyebrow">Welcome Back</span>
        <h1>Return to your agriculture portfolio.</h1>
        <p>Track farm-backed investments, deposits, and growth from a premium dashboard built for clarity.</p>
      </div>
    </section>
    <section class="auth-panel glass">
      <span class="eyebrow">Secure Login</span>
      <h2 class="auth-title">Sign in to AgriWealth</h2>
      <form id="loginForm">
        <div class="input-group"><input type="email" class="input" placeholder="Email" required id="email"></div>
        <div class="input-group"><input type="password" class="input" placeholder="Password" required id="pass"><button type="button" class="toggle-eye">Show</button></div>
        <button type="submit" class="btn auth-submit" id="loginBtn">Sign In</button>
      </form>
      <div class="social-row">
        <button class="btn btn-outline social-btn" data-provider="google">Google</button>
        <button class="btn btn-outline social-btn" data-provider="facebook">Facebook</button>
      </div>
      <p class="auth-link">No account? <a href="signup.html">Sign Up</a></p>
    </section>
  </main>
  <script type="module">
    console.log("[Login] Page script loading");

    import { loginUser, loginWithProvider } from './js/auth.js';
    import { markRedirecting, initRouter } from './js/router.js';

    const loginBtn = document.getElementById('loginBtn');
    const socialBtns = document.querySelectorAll('.social-btn');

    // Toggle password visibility
    document.querySelector('.toggle-eye').onclick = e => {
      const i = e.target.previousElementSibling;
      i.type = i.type === 'password' ? 'text' : 'password';
      e.target.textContent = i.type === 'password' ? 'Show' : 'Hide';
    };

    // ✅ FIX: Form submit - disable button, no setLoading (overlay was stealing focus)
    document.getElementById('loginForm').onsubmit = async e => {
      e.preventDefault();
      e.stopPropagation();
      console.log("[Login] Form submitted, disabling button");

      loginBtn.disabled = true;
      loginBtn.textContent = 'Signing in...';

      try {
        const success = await loginUser(
          document.getElementById('email').value,
          document.getElementById('pass').value
        );
        if (success) {
          // ✅ Mark redirecting so router doesn't double-redirect after auth state change
          markRedirecting();
          console.log("[Login] Login successful, redirecting to dashboard");
          window.location.href = 'dashboard.html';
        }
      } finally {
        // Re-enable only if we're still on the page (redirect didn't happen)
        loginBtn.disabled = false;
        loginBtn.textContent = 'Sign In';
        console.log("[Login] Button re-enabled");
      }
    };

    // ✅ FIX: Social login - disable all buttons during popup
    socialBtns.forEach(btn => {
      btn.addEventListener('click', async () => {
        const provider = btn.dataset.provider;
        console.log("[Login] Social login clicked:", provider);
        socialBtns.forEach(b => b.disabled = true);
        loginBtn.disabled = true;
        try {
          await loginWithProvider(provider);
        } finally {
          socialBtns.forEach(b => b.disabled = false);
          loginBtn.disabled = false;
        }
      });
    });

    // ✅ AUTH GATE: Wait for auth state to resolve before showing the form.
    // This prevents the blink where the login form flashes briefly before
    // the router redirects an already-logged-in user to the dashboard.
    function showAuthForm() {
      const shell = document.querySelector('.auth-shell');
      if (shell && !shell.classList.contains('auth-ready')) {
        shell.classList.add('auth-ready');
        console.log("[Login] Auth form is now visible");
      }
    }

    // Listen for auth resolution from the router
    window.addEventListener('auth-resolved', (e) => {
      console.log("[Login] Auth resolved, user:", e.detail.user ? e.detail.user.uid : "null");
      if (!e.detail.user) {
        // No user → show the login form
        showAuthForm();
      }
      // If user exists, router will redirect to dashboard — form stays hidden, no blink!
    });

    // Fallback: show form after 2 seconds even if auth event never fires
    // (handles edge cases like network issues or blocked Firebase)
    setTimeout(() => {
      if (!document.querySelector('.auth-shell.auth-ready')) {
        console.log("[Login] Fallback: showing auth form after timeout");
        showAuthForm();
      }
    }, 2000);

    // Register auth listener (triggers auth-resolved event)
    console.log("[Login] Initializing router");
    initRouter();
  </script>
</body>
</html>
