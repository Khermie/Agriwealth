<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | AgriWealth</title>
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">
  <main class="auth-shell">
    <section class="auth-art">
      <a href="index.html" class="logo">AgriWealth</a>
      <div class="auth-art-copy">
        <span class="eyebrow">Welcome Back</span>
        <h1>Return to your agriculture portfolio.</h1>
        <p>Track farm-backed investments, deposits, and growth from a premium dashboard built for clarity.</p>
      </div>
    </section>
    <section class="auth-panel glass">
      <span class="eyebrow">Secure Login</span>
      <h2 class="auth-title">Sign in to AgriWealth</h2>
      <form id="loginForm">
        <div class="input-group"><input type="email" class="input" placeholder="Email" required id="email"></div>
        <div class="input-group"><input type="password" class="input" placeholder="Password" required id="pass"><button type="button" class="toggle-eye" id="togglePassword">Show</button></div>
        <button type="submit" class="btn auth-submit" id="loginBtn">Sign In</button>
        <p style="text-align:center;margin-top:12px;"><a href="#" id="forgotLink" style="color:var(--amber);font-weight:800;font-size:0.88rem;">Forgot password?</a></p>
      </form>
      <div class="social-row">
        <button class="btn btn-outline social-btn" data-provider="google">Google</button>
        <button class="btn btn-outline social-btn" data-provider="facebook">Facebook</button>
      </div>
      <p class="auth-link">No account? <a href="signup.html">Sign Up</a></p>
    </section>
  </main>
   <script type="module">
  import { loginUser, loginWithProvider, resetPassword } from './js/auth.js?v=6';
  import { initRouter } from './js/router.js?v=6';
  import { showToast } from './js/utils.js?v=6';

  console.log("[Login] ✅ Modules loaded");

  const loginBtn = document.getElementById('loginBtn');
  const socialBtns = document.querySelectorAll('.social-btn');
  const passInput = document.getElementById('pass');
  const toggleBtn = document.getElementById('togglePassword');

  // Password toggle
  toggleBtn.addEventListener('click', () => {
    const hidden = passInput.type === "password";
    passInput.type = hidden ? "text" : "password";
    toggleBtn.textContent = hidden ? "🙈" : "👁";
  });

  // Forgot password
  document.getElementById('forgotLink').addEventListener('click', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    if (!email) return showToast("Enter email first", "warning");
    await resetPassword(email);
  });

  // ✅ FIXED LOGIN SUBMIT
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    console.log("[Login] 🚀 Form submitted");

    loginBtn.disabled = true;
    loginBtn.textContent = "Signing in...";

    try {
      const email = document.getElementById('email').value.trim();
      const password = passInput.value;
      
      console.log("[Login] Calling loginUser for:", email);
      const success = await loginUser(email, password);
      
      console.log("[Login] loginUser returned:", success);
      
      if (success) {
        console.log("[Login] ✅ Login successful! Waiting for auth.js redirect...");
        // auth.js handles the redirect, but we add a fallback just in case
        setTimeout(() => {
          console.log("[Login] Fallback redirect to dashboard");
          window.location.href = 'dashboard.html';
        }, 2000);
      } else {
        console.log("[Login] ❌ Login failed");
        loginBtn.disabled = false;
        loginBtn.textContent = "Sign In";
      }
    } catch (error) {
      console.error("[Login] 💥 Error:", error);
      showToast("Login failed: " + error.message, "error");
      loginBtn.disabled = false;
      loginBtn.textContent = "Sign In";
    }
  });

  // Social login
  socialBtns.forEach(btn => {
    btn.addEventListener('click', async () => {
      console.log("[Login] Social login:", btn.dataset.provider);
      socialBtns.forEach(b => b.disabled = true);
      try {
        await loginWithProvider(btn.dataset.provider);
      } catch (error) {
        console.error(error);
        socialBtns.forEach(b => b.disabled = false);
      }
    });
  });

  initRouter();
  console.log("[Login] 🚦 Router initialized");
</script>
</body>
</html>
